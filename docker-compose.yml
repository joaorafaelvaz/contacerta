services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meusaldo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meusaldo}
      POSTGRES_DB: ${POSTGRES_DB:-meusaldo}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meusaldo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: ["prod"]
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-meusaldo}:${POSTGRES_PASSWORD:-meusaldo}@db:5432/${POSTGRES_DB:-meusaldo}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  pgdata:
