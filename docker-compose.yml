# Desenvolvimento local: só o Postgres (o app roda com `pnpm dev`).
# Produção/VPS: use deploy/portainer-stack.yml (Portainer ou deploy/deploy.sh).
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meusaldo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meusaldo}
      POSTGRES_DB: ${POSTGRES_DB:-meusaldo}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meusaldo}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
