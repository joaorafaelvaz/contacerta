# ContaCerta — nginx nativo do VPS
#
# Instalação:
#   sudo cp deploy/nginx-contacerta.conf /etc/nginx/sites-available/contacerta
#   sudo ln -s /etc/nginx/sites-available/contacerta /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (após o DNS de contacerta.linkwise.digital apontar para o VPS):
#   sudo certbot --nginx -d contacerta.linkwise.digital
#   (o certbot reescreve este arquivo adicionando o bloco 443 e o redirect)

server {
    listen 80;
    listen [::]:80;
    server_name contacerta.linkwise.digital;

    # uploads/payloads (ajuste se um dia houver importação de arquivos)
    client_max_body_size 10m;

    location / {
        # porta publicada pela stack (deploy/portainer-stack.yml → APP_PORT)
        proxy_pass http://127.0.0.1:3078;
        proxy_http_version 1.1;

        # cabeçalhos para o better-auth/Next enxergarem o host e o protocolo reais
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # hot paths do Next (SSE/streaming) e futuras conexões longas
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
