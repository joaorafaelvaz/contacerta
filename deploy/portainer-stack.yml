# ContaCerta — stack de produção (contacerta.linkwise.digital)
#
# Portainer: Stacks → Add stack → Repository
#   - URL: https://github.com/joaorafaelvaz/contacerta (privado: configure as
#     credenciais GitHub/PAT no Portainer)
#   - Compose path: deploy/portainer-stack.yml
#   - Environment variables: cole o conteúdo de deploy/env.prod.example preenchido
#
# CLI (alternativa): ./deploy/deploy.sh  (usa .env.prod na raiz do repo)
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: contacerta:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-contacerta}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-contacerta}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://contacerta.linkwise.digital}
      WAHA_URL: ${WAHA_URL:-}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_SESSION: ${WAHA_SESSION:-default}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      REMINDER_CRON: ${REMINDER_CRON:-0 8 * * *}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      # loopback: só o nginx nativo do VPS alcança; o mundo entra pelo domínio
      - "127.0.0.1:${APP_PORT:-3078}:3000"
    extra_hosts:
      # permite alcançar serviços do host (WAHA/Ollama publicados em portas locais)
      # via http://host.docker.internal:<porta>
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contacerta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-contacerta}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contacerta}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # sem ports: o banco só é acessível pela rede interna da stack

volumes:
  pgdata:
